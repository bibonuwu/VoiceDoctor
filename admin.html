<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin — Export</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0f172a;
    --surface:#1e293b;
    --surface-2:#334155;
    --border:#334155;
    --text:#f1f5f9;
    --text-soft:#cbd5e1;
    --text-mute:#94a3b8;
    --primary:#0ea5e9;
    --primary-dark:#0284c7;
    --accent:#10b981;
    --danger:#ef4444;
    --warn:#f59e0b;
  }
  html,body{font-family:'Inter',system-ui,sans-serif;color:var(--text);background:var(--bg);min-height:100vh;-webkit-font-smoothing:antialiased}

  /* Login overlay */
  .login{position:fixed;inset:0;background:linear-gradient(135deg,#0f172a,#1e293b);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
  .login-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:32px;max-width:380px;width:100%;box-shadow:0 30px 80px rgba(0,0,0,.5)}
  .login-card h1{font-size:22px;font-weight:800;margin-bottom:8px}
  .login-card p{color:var(--text-mute);font-size:14px;margin-bottom:20px}
  .login-card input{width:100%;padding:12px 14px;border-radius:10px;border:1px solid var(--border);background:#0f172a;color:var(--text);font-size:15px;font-family:inherit;outline:none;transition:border-color .15s;margin-bottom:10px}
  .login-card input:focus{border-color:var(--primary)}
  .login-card button{width:100%;margin-top:6px;padding:12px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;font-weight:700;font-size:15px;cursor:pointer;font-family:inherit;transition:transform .15s,box-shadow .2s}
  .login-card button:hover{transform:translateY(-2px);box-shadow:0 10px 24px -8px rgba(14,165,233,.6)}
  .login-card .err{color:var(--danger);font-size:13px;margin-top:8px;min-height:18px}

  /* Topbar */
  .topbar{position:sticky;top:0;z-index:10;background:rgba(15,23,42,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:14px 22px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .topbar h1{font-size:18px;font-weight:800;letter-spacing:-.01em;margin-right:auto}
  .topbar .who{font-size:13px;color:var(--text-mute)}
  .topbar button{padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-weight:600;font-size:13px;cursor:pointer;font-family:inherit}
  .topbar button:hover{background:var(--surface-2);border-color:var(--primary)}

  /* Cards */
  .wrap{max-width:880px;margin:40px auto;padding:0 22px;display:grid;gap:20px;grid-template-columns:repeat(auto-fit,minmax(360px,1fr))}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px}
  .card h2{font-size:18px;font-weight:800;margin-bottom:4px;display:flex;align-items:center;gap:10px}
  .card .desc{color:var(--text-mute);font-size:13px;margin-bottom:16px}
  .card .count{display:inline-flex;align-items:center;gap:8px;padding:6px 12px;border-radius:999px;background:#0b1424;border:1px solid var(--border);font-size:13px;font-weight:600;color:var(--text-soft);margin-bottom:18px}
  .card .count b{color:var(--text);font-weight:800}
  .card .count .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent)}
  .card .count.loading .dot{background:var(--warn);box-shadow:0 0 8px var(--warn);animation:pulse 1s infinite}
  .card .count.error  .dot{background:var(--danger);box-shadow:0 0 8px var(--danger)}
  @keyframes pulse{50%{opacity:.4}}
  .actions{display:flex;gap:10px;flex-wrap:wrap}
  .actions button{flex:1;min-width:140px;padding:12px 16px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;transition:transform .15s,box-shadow .2s,opacity .15s;display:inline-flex;align-items:center;justify-content:center;gap:6px}
  .actions button:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 10px 24px -8px rgba(14,165,233,.6)}
  .actions button:disabled{opacity:.5;cursor:not-allowed}
  .actions button.ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
  .actions button.ghost:hover:not(:disabled){background:var(--surface-2);border-color:var(--primary)}
  .err{color:var(--danger);font-size:13px;margin-top:10px;min-height:18px}
  .ok{color:var(--accent);font-size:13px;margin-top:10px;min-height:18px}
</style>
</head>
<body>

<!-- Login -->
<div class="login" id="login" style="display:none">
  <form class="login-card" id="loginForm">
    <h1>Admin кіру</h1>
    <p>Email мен парольді енгізіңіз.</p>
    <input type="email"    id="email" placeholder="Email" autocomplete="email" required />
    <input type="password" id="pwd"   placeholder="Пароль" autocomplete="current-password" required />
    <button type="submit">Кіру</button>
    <div class="err" id="loginErr"></div>
  </form>
</div>

<!-- App -->
<div id="app" style="display:none">
  <header class="topbar">
    <h1>📦 Деректерді жүктеп алу</h1>
    <span class="who" id="who"></span>
    <button id="logoutBtn">Шығу</button>
  </header>

  <main class="wrap">
    <section class="card" data-source="visitors">
      <h2>👥 visitors</h2>
      <div class="desc">Сайтқа кірген барлық қонақтардың метадеректері.</div>
      <div class="count loading"><span class="dot"></span> Жазба саны: <b data-count>—</b></div>
      <div class="actions">
        <button data-act="csv">⬇ CSV</button>
        <button data-act="xlsx">⬇ Excel</button>
        <button class="ghost" data-act="json">⬇ JSON</button>
      </div>
      <div class="err" data-err></div>
      <div class="ok"  data-ok></div>
    </section>

    <section class="card" data-source="voters">
      <h2>🗳 voters</h2>
      <div class="desc">Дауыс берген қолданушылар (әр құрылғы үшін бір жазба).</div>
      <div class="count loading"><span class="dot"></span> Жазба саны: <b data-count>—</b></div>
      <div class="actions">
        <button data-act="csv">⬇ CSV</button>
        <button data-act="xlsx">⬇ Excel</button>
        <button class="ghost" data-act="json">⬇ JSON</button>
      </div>
      <div class="err" data-err></div>
      <div class="ok"  data-ok></div>
    </section>
  </main>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
  import { getFirestore, collection, getDocs, getCountFromServer }
    from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, setPersistence, browserSessionPersistence }
    from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAQlLh2Abk92sZVCSsYSCxvps4Uld3C1Lk",
    authDomain: "bibonrat.firebaseapp.com",
    databaseURL: "https://bibonrat-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "bibonrat",
    storageBucket: "bibonrat.firebasestorage.app",
    messagingSenderId: "78759159251",
    appId: "1:78759159251:web:3e40d7d5a2aa762f01bb26"
  };
  const app  = initializeApp(firebaseConfig);
  const db   = getFirestore(app);
  const auth = getAuth(app);
  setPersistence(auth, browserSessionPersistence).catch(()=>{});

  const loginEl = document.getElementById("login");
  const appEl   = document.getElementById("app");
  const whoEl   = document.getElementById("who");

  function showApp(user){
    loginEl.style.display = "none";
    appEl.style.display   = "block";
    whoEl.textContent     = user.email || "";
    refreshCounts();
  }
  function showLogin(){
    loginEl.style.display = "flex";
    appEl.style.display   = "none";
  }

  onAuthStateChanged(auth, user => {
    if (user) showApp(user);
    else      showLogin();
  });

  document.getElementById("loginForm").addEventListener("submit", async e => {
    e.preventDefault();
    const email = document.getElementById("email").value.trim();
    const pwd   = document.getElementById("pwd").value;
    const errEl = document.getElementById("loginErr");
    errEl.textContent = "";
    try{
      await signInWithEmailAndPassword(auth, email, pwd);
    }catch(err){
      errEl.textContent = "Кіру сәтсіз. Email/пароль қате немесе рұқсат жоқ.";
      document.getElementById("pwd").value = "";
      console.warn("[auth]", err.code);
    }
  });
  document.getElementById("logoutBtn").addEventListener("click", async () => {
    try{ await signOut(auth); }catch{}
    location.reload();
  });

  // ---------- Counts ----------
  async function refreshCounts(){
    for(const card of document.querySelectorAll(".card")){
      const source = card.dataset.source;
      const countEl = card.querySelector("[data-count]");
      const countWrap = card.querySelector(".count");
      countWrap.classList.remove("error");
      countWrap.classList.add("loading");
      try{
        const snap = await getCountFromServer(collection(db, source));
        countEl.textContent = snap.data().count.toLocaleString("ru-RU");
        countWrap.classList.remove("loading");
      }catch(err){
        countEl.textContent = "қате";
        countWrap.classList.remove("loading");
        countWrap.classList.add("error");
        console.warn("[count]", source, err.code || err.message);
      }
    }
  }

  // ---------- Download ----------
  async function fetchAll(source){
    const snap = await getDocs(collection(db, source));
    const rows = [];
    snap.forEach(d => rows.push({ _id: d.id, ...d.data() }));
    return rows;
  }

  function flattenValue(v){
    if (v == null) return "";
    if (typeof v === "object" && typeof v.toDate === "function") return fmtTs(v);
    if (typeof v === "object" && v.seconds != null && v.nanoseconds != null) return fmtTs(v);
    if (Array.isArray(v))   return v.join(", ");
    if (typeof v === "object") return JSON.stringify(v);
    return String(v);
  }
  function fmtTs(ts){
    let d;
    if (ts && typeof ts.toDate === "function") d = ts.toDate();
    else if (ts && ts.seconds != null)         d = new Date(ts.seconds*1000);
    else return "";
    if (isNaN(d.getTime())) return "";
    const pad = n => String(n).padStart(2,"0");
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
  }

  // Әр құжатта поля жиыны әр түрлі — барлығының бірлестігін аламыз
  function collectHeaders(rows){
    const set = new Set(["_id"]);
    for (const r of rows) for (const k of Object.keys(r)) set.add(k);
    set.delete("_id");
    return ["_id", ...Array.from(set).sort()];
  }

  function rowsAsTable(rows){
    const headers = collectHeaders(rows);
    const data = rows.map(r => headers.map(h => flattenValue(r[h])));
    return { headers, data };
  }

  function exportCsv(rows, name){
    const { headers, data } = rowsAsTable(rows);
    const escape = s => `"${String(s).replace(/"/g,'""').replace(/\r?\n/g," ")}"`;
    const csv = [headers.map(escape).join(","), ...data.map(row => row.map(escape).join(","))].join("\r\n");
    const blob = new Blob(["﻿" + csv], { type: "text/csv;charset=utf-8;" });
    downloadBlob(blob, `${name}_${stamp()}.csv`);
  }

  function exportXlsx(rows, name){
    const { headers, data } = rowsAsTable(rows);
    const xmlEsc = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    const cell = v => {
      const s = v == null ? "" : String(v);
      const isNum = s !== "" && !isNaN(s) && /^-?\d+(\.\d+)?$/.test(s);
      const t = isNum ? "Number" : "String";
      return `<Cell><Data ss:Type="${t}">${xmlEsc(s)}</Data></Cell>`;
    };
    const rowsXml = [
      `<Row>${headers.map(h => `<Cell><Data ss:Type="String">${xmlEsc(h)}</Data></Cell>`).join("")}</Row>`,
      ...data.map(r => `<Row>${r.map(cell).join("")}</Row>`)
    ].join("");
    const xml = `<?xml version="1.0"?>
<?mso-application progid="Excel.Sheet"?>
<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet"
 xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet">
 <Worksheet ss:Name="${name}">
  <Table>${rowsXml}</Table>
 </Worksheet>
</Workbook>`;
    const blob = new Blob([xml], { type: "application/vnd.ms-excel" });
    downloadBlob(blob, `${name}_${stamp()}.xls`);
  }

  function exportJson(rows, name){
    const blob = new Blob([JSON.stringify(rows, null, 2)], { type: "application/json" });
    downloadBlob(blob, `${name}_${stamp()}.json`);
  }

  function downloadBlob(blob, filename){
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click();
    setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); }, 100);
  }
  function stamp(){
    const d = new Date(), pad = n => String(n).padStart(2,"0");
    return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}_${pad(d.getHours())}${pad(d.getMinutes())}`;
  }

  // ---------- Wire up download buttons ----------
  for (const card of document.querySelectorAll(".card")){
    const source = card.dataset.source;
    const errEl  = card.querySelector("[data-err]");
    const okEl   = card.querySelector("[data-ok]");
    const btns   = card.querySelectorAll(".actions button");

    card.querySelectorAll(".actions button").forEach(btn => {
      btn.addEventListener("click", async () => {
        const act = btn.dataset.act;
        errEl.textContent = "";
        okEl.textContent  = "";
        const origText = btn.textContent;
        btns.forEach(b => b.disabled = true);
        btn.textContent = "Жүктелуде…";
        try{
          const rows = await fetchAll(source);
          if (act === "csv")  exportCsv(rows, source);
          if (act === "xlsx") exportXlsx(rows, source);
          if (act === "json") exportJson(rows, source);
          okEl.textContent = `Сақталды: ${rows.length.toLocaleString("ru-RU")} жазба.`;
        }catch(err){
          errEl.textContent = "Қате: " + (err.code || err.message);
          console.error("[export]", source, err);
        }finally{
          btn.textContent = origText;
          btns.forEach(b => b.disabled = false);
        }
      });
    });
  }
</script>
</body>
</html>
